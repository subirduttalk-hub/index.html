<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>আমন্ত্রণ Banquet</title>

<style>
  :root {
    --gold: #c9a84c; --gold-light: #e8c97a; --gold-pale: #f5e9c9;
    --deep: #1a0f05; --dark: #2a1a0a; --mid: #4a3015;
    --cream: #faf5ec; --white: #fffef8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--cream); color: var(--deep); font-family: 'Raleway', sans-serif; overflow-x: hidden; }

  nav {
    position: fixed; top: 0; width: 100%; z-index: 999;
    background: rgba(26,15,5,0.97); backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(201,168,76,0.3);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 62px;
  }
  .nav-logo { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold); letter-spacing: 2px; text-decoration: none; display:flex; flex-direction:column; line-height:1.1; }
  .nav-logo .logo-bengali { font-family: 'Noto Sans Bengali', sans-serif; font-size: 1rem; color: var(--gold-light); font-weight: 700; letter-spacing:1px; }
  .nav-logo .logo-banquet { font-size: 0.58rem; letter-spacing: 5px; color: #c0c0c0; text-transform: uppercase; font-weight: 400; margin-top:1px; }
  .nav-links { display: flex; gap: 20px; list-style: none; }
  .nav-links button { background:none; border:none; color: rgba(255,255,255,0.7); font-size: 0.7rem; letter-spacing: 1.8px; text-decoration: none; text-transform: uppercase; font-weight: 500; transition: color 0.2s; cursor:pointer; font-family:'Raleway',sans-serif; padding:0; }
  .nav-links button:hover, .nav-links button.active { color: var(--gold); }

  .page { display: none; padding-top: 62px; min-height: 100vh; }
  .page.active { display: block; }

  .section-hero { background: linear-gradient(135deg, var(--deep) 0%, var(--dark) 100%); padding: 50px 32px 36px; text-align: center; }
  .section-hero h2 { font-family: 'Cinzel', serif; font-size: 1.9rem; color: var(--gold); letter-spacing: 4px; }
  .section-hero p { color: rgba(255,255,255,0.5); margin-top: 10px; font-size: 0.88rem; letter-spacing: 1px; }
  .gold-line { width: 60px; height: 2px; background: var(--gold); margin: 16px auto 0; }

  /* HOME */
  .hero { height: calc(100vh - 62px); background: linear-gradient(160deg, #1a0f05 0%, #3a2010 40%, #1a0f05 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; text-align: center; }
  .hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 60%, rgba(201,168,76,0.12) 0%, transparent 70%); }
  .hero-ornament { font-family:'Noto Sans Bengali',sans-serif; font-size:5rem; color:#f5c000; font-weight:700; position:absolute; top:10%; left:50%; transform:translateX(-50%); letter-spacing:10px; white-space:nowrap; pointer-events:none; }
  .hero-tag { font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:6px; color:var(--gold); margin-bottom:18px; animation:fadeUp 1s ease both; }
  .hero h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(2.8rem,7vw,5.5rem); color:var(--white); font-weight:300; line-height:1.1; animation:fadeUp 1s 0.2s ease both; }
  .hero h1 em { font-style:italic; color:var(--gold-light); }
  .hero-sub { font-size:0.88rem; color:rgba(255,255,255,0.5); letter-spacing:2px; margin-top:16px; animation:fadeUp 1s 0.4s ease both; }
  .hero-divider { width:80px; height:1px; background:var(--gold); margin:26px auto; position:relative; animation:fadeUp 1s 0.5s ease both; }
  .hero-divider::before,.hero-divider::after { content:'◆'; position:absolute; top:50%; transform:translateY(-50%); color:var(--gold); font-size:0.5rem; }
  .hero-divider::before { left:-14px; } .hero-divider::after { right:-14px; }
  .hero-cta { display:flex; gap:14px; justify-content:center; animation:fadeUp 1s 0.6s ease both; }
  .btn-gold { background:var(--gold); color:var(--deep); border:none; padding:12px 32px; font-family:'Cinzel',serif; font-size:0.72rem; letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:all 0.25s; }
  .btn-gold:hover { background:var(--gold-light); transform:translateY(-2px); }
  .btn-outline { background:transparent; color:var(--gold); border:1px solid var(--gold); padding:12px 32px; font-family:'Cinzel',serif; font-size:0.72rem; letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:all 0.25s; }
  .btn-outline:hover { background:rgba(201,168,76,0.1); transform:translateY(-2px); }
  .stats-bar { display:flex; justify-content:center; background:var(--dark); border-top:1px solid rgba(201,168,76,0.2); }
  .stat { flex:1; max-width:220px; padding:26px 20px; text-align:center; border-right:1px solid rgba(201,168,76,0.15); }
  .stat:last-child { border-right:none; }
  .stat-num { font-family:'Cormorant Garamond',serif; font-size:2.2rem; color:var(--gold); }
  .stat-lbl { font-size:0.65rem; letter-spacing:2px; color:rgba(255,255,255,0.45); text-transform:uppercase; margin-top:4px; }

  /* CALENDAR */
  .cal-wrap { max-width: 820px; margin: 0 auto; padding: 40px 24px; }
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .cal-title { font-family:'Cinzel',serif; font-size:1.1rem; color:var(--dark); letter-spacing:2px; }
  .cal-nav { display:flex; gap:10px; }
  .cal-nav button { background:var(--white); border:1px solid var(--gold); color:var(--gold); padding:7px 16px; font-family:'Cinzel',serif; font-size:0.72rem; cursor:pointer; transition:all 0.2s; }
  .cal-nav button:hover { background:var(--gold); color:var(--deep); }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-day-name { text-align:center; font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:1px; color:var(--mid); padding:8px 0; }
  .cal-cell { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border:1px solid transparent; cursor:default; position:relative; min-height:48px; background:var(--white); transition:all 0.2s; }
  .cal-cell:hover:not(.cal-empty):not(.cal-booked) { border-color:var(--gold); }
  .cal-cell.cal-empty { background:transparent; border:none; }
  .cal-cell.cal-today { border-color:var(--gold); background:var(--gold-pale); }
  .cal-cell.cal-booked { background:#2a1a0a !important; border-color:#4a3015 !important; cursor:default; }
  .cal-cell.cal-booked .cal-num { color:var(--gold) !important; font-weight:600; }
  .cal-cell .cal-num { font-size:0.82rem; color:var(--dark); font-family:'Raleway',sans-serif; }
  .cal-cell .cal-dot { width:5px; height:5px; background:var(--gold); border-radius:50%; margin-top:3px; }
  .cal-cell.cal-booked .cal-dot { background:var(--gold-light) !important; display: block !important; }
  .cal-legend { display:flex; gap:20px; margin-top:18px; flex-wrap:wrap; }
  .cal-legend-item { display:flex; align-items:center; gap:8px; font-size:0.75rem; color:var(--mid); }
  .cal-legend-box { width:14px; height:14px; border:1px solid #ddd; }
  .cal-legend-box.booked { background:#2a1a0a; border-color:#4a3015; }
  .cal-legend-box.today { background:var(--gold-pale); border-color:var(--gold); }
</style>
</head>
<body>
<script>
// ... (Lines 520 - 800 remain same) ...

// ── CALENDAR ── (MODIFIED TO SUPPORT AUTOMATIC BOOKING MARKING)
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function changeMonth(dir){ calMonth+=dir; if(calMonth>11){calMonth=0;calYear++;} if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }

function renderCalendar(){
  document.getElementById('cal-month-label').textContent=MONTHS[calMonth]+' '+calYear;
  const grid=document.getElementById('cal-grid');
  let html=DAYS.map(d=>`<div class="cal-day-name">${d}</div>`).join('');
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayStr=today();
  
  // Extract all booked dates from the bookings array
  const bookedDates = bookings.map(b => b.date);

  for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell cal-empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    
    // Check if this date (ds) exists in our bookings array
    const isBooked = bookedDates.includes(ds);
    const isToday = ds === todayStr;
    
    const cls = ['cal-cell', isBooked ? 'cal-booked' : '', (isToday && !isBooked) ? 'cal-today' : ''].filter(Boolean).join(' ');
    
    html+=`<div class="${cls}" title="${isBooked ? 'Booked' : 'Available'}">
      <span class="cal-num">${d}</span>
      ${isBooked ? '<span class="cal-dot"></span>' : ''}
    </div>`;
  }
  grid.innerHTML=html;

  // Booked list for the month
  const monthBookings=bookings.filter(b=>b.date.startsWith(calYear+'-'+String(calMonth+1).padStart(2,'0'))).sort((a,b)=>a.date.localeCompare(b.date));
  const evDiv=document.getElementById('cal-booked-events');
  if(!monthBookings.length){ evDiv.innerHTML='<div class="no-data" style="padding:20px">This month has no bookings yet.</div>'; return; }
  evDiv.innerHTML=monthBookings.map(b=>`
    <div class="cal-event-row">
      <div class="cal-event-date">${formatDate(b.date)}</div>
      <div class="cal-event-info">${b.name} — ${b.type}<br><span>${b.pkg} Package · ${b.guests||'?'} guests</span></div>
    </div>`).join('');
}

  if(pinBuffer.length >= 6) return;
  pinBuffer += num;
  updatePinDots();
  if(pinBuffer.length === 6) checkPin();
}

</script>
</body>
</html>
