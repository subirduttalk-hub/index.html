<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1a0f05"/>
  
  <!-- Gold border -->
  <rect x="12" y="12" width="488" height="488" rx="72" fill="none" stroke="#c9a84c" stroke-width="8"/>
  
  <!-- Inner decorative border -->
  <rect x="28" y="28" width="456" height="456" rx="60" fill="none" stroke="#c9a84c" stroke-width="2" stroke-dasharray="8,6" opacity="0.4"/>

  <!-- Corner ornaments -->
  <text x="42" y="75" font-size="32" fill="#c9a84c" opacity="0.6" font-family="serif">◆</text>
  <text x="440" y="75" font-size="32" fill="#c9a84c" opacity="0.6" font-family="serif">◆</text>
  <text x="42" y="490" font-size="32" fill="#c9a84c" opacity="0.6" font-family="serif">◆</text>
  <text x="440" y="490" font-size="32" fill="#c9a84c" opacity="0.6" font-family="serif">◆</text>

  <!-- Top gold line -->
  <rect x="160" y="110" width="192" height="3" rx="2" fill="#c9a84c" opacity="0.7"/>

  <!-- Bengali আ letter - main icon -->
  <text y="360" x="256" text-anchor="middle" font-size="260" fill="#f5c000" font-family="'Noto Sans Bengali', serif" font-weight="700">আ</text>

  <!-- Bottom text BANQUET -->
  <text y="450" x="256" text-anchor="middle" font-size="52" fill="#c0c0c0" font-family="serif" letter-spacing="12" font-weight="400">BANQUET</text>

  <!-- Bottom gold line -->
  <rect x="160" y="462" width="192" height="3" rx="2" fill="#c9a84c" opacity="0.7"/>
</svg>
